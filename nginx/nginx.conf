events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Static asset cache (generated JS/CSS with hashed filenames)
  map $uri $cache_control {
    ~*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webm)$ "public, max-age=31536000, immutable";
    default "public, max-age=300";
  }

  # Upstream API
  upstream api {
    server api:3001;
  }

  server {
    listen 80;
    server_name _;

    # Certbot challenge location (uncomment and set server_name for Let's Encrypt)
    # location /.well-known/acme-challenge/ {
    #   root /var/www/certbot;
    # }

    # Redirect HTTP to HTTPS when certificates are present
    # if ($scheme != https) {
    #   return 301 https://$host$request_uri;
    # }

    # API proxy
    location /api/ {
      proxy_pass http://api/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }

    # Uploaded review videos (proxy to S3 or local upload store)
    location /uploads/ {
      proxy_pass http://api/uploads/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      expires 1d;
    }

    # Static web app
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control $cache_control;
    }
  }

  # SSL server block template (uncomment after running certbot)
  # server {
  #   listen 443 ssl http2;
  #   server_name example.com;
  #
  #   ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
  #
  #   include /etc/letsencrypt/options-ssl-nginx.conf;
  #   ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  #
  #   location /api/ { proxy_pass http://api/; ... }
  #   location / { root /usr/share/nginx/html; try_files $uri $uri/ /index.html; }
  # }
}
