version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: silent-review-postgres
    environment:
      POSTGRES_USER: silentreview
      POSTGRES_PASSWORD: silentreview
      POSTGRES_DB: silentreview
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silentreview -d silentreview"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: silent-review-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
